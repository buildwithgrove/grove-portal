name: Format and Test

on:
  push:
    branches:
      - "wip/**"
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  format-and-test:
    name: Format, Build & Test
    runs-on: ubuntu-latest
    environment: CI

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format code and generate types
        run: make portal_format
        env:
          PORTAL_API_URL: ${{ secrets.PORTAL_API_URL }}
          PORTAL_ADMIN_KEY: ${{ secrets.PORTAL_ADMIN_KEY }}

      - name: Run unit tests
        run: make portal_test

      - name: Build application for E2E
        run: pnpm run build

      - name: Run E2E tests
        run: pnpm run test:e2e:run
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-summary.json
          flags: unittests
          name: grove-portal-coverage
        continue-on-error: true
